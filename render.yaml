# Render Blueprint — Barber backend (Django + Channels/WebSocket).
# Deploy: push to GitHub, then Render → New → Blueprint → pick this repo.
# Free Postgres + free web service. Set TELEGRAM_BOT_TOKEN as a secret in the
# dashboard (it is marked sync:false below so it is never committed).

databases:
  - name: barber-db
    plan: free
    databaseName: barber
    user: barber

services:
  - type: web
    name: barber-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    healthCheckPath: /api/v1/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong secret
      - key: DEBUG
        value: "False"
      - key: USE_INMEMORY_CHANNELS
        value: "True"              # single instance → no Redis needed
      # Allow Render's own host (HTTP) + the Vercel page (WebSocket Origin check).
      - key: ALLOWED_HOSTS
        value: ".onrender.com,barber-bot-tau.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: barber-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: "https://barber-bot-tau.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://barber-bot-tau.vercel.app,https://*.onrender.com"
      - key: WEBAPP_URL
        value: "https://barber-bot-tau.vercel.app"
      - key: TELEGRAM_BOT_TOKEN
        sync: false                # set this secret in the Render dashboard
      - key: OTP_DEV_PRINT
        value: "True"
